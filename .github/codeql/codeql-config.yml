name: "CodeQL config for sdk-go"

# Run two query suites in one analysis:
#   security-extended  → submitted as Code Scanning (Security tab)
#   code-quality       → submitted as Code Quality (Code Quality tab)
# The split between Security and Code Quality is controlled by `analysis-kinds`
# on the analyze step in .github/workflows/codeql.yml.
queries:
  - uses: security-extended
  - uses: code-quality

# Exclude generated code, vendored dependencies, and test fixtures from
# being scanned and from contributing to alert counts.
paths-ignore:
  - "tests/mock/**"
  - "**/*_test.go"
  - "**/testdata/**"
  - "generator/**"   # code-generation templates; flagged findings are not runtime issues

# Optional: limit to the actual SDK source tree.
# paths:
#   - "."
