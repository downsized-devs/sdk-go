name: "CodeQL config for sdk-go"

# Run two query suites in one analysis:
#   security-extended  → standard security queries
#   code-quality       → code-quality queries (style, complexity, dead code, …)
# Both produce findings in the Code Scanning / Security tab. GitHub's separate
# "Code Quality" findings tab is currently only populated by the default setup
# (it uses an internal init parameter that isn't part of the public action API),
# so disable that default setup in repo settings once this consolidation merges.
queries:
  - uses: security-extended
  - uses: code-quality

# Exclude generated code, vendored dependencies, and test fixtures from
# being scanned and from contributing to alert counts.
paths-ignore:
  - "tests/mock/**"
  - "**/*_test.go"
  - "**/testdata/**"
  - "generator/**"   # code-generation templates; flagged findings are not runtime issues

# Optional: limit to the actual SDK source tree.
# paths:
#   - "."
